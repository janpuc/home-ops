---
apiVersion: keda.sh/v1alpha1
kind: ScaledObject
metadata:
  name: ${APP}
spec:
  scaleTargetRef:
    name: ${APP}
  minReplicaCount: 0
  maxReplicaCount: 1
  cooldownPeriod: ${HTTP_COOLDOWN:=300}
  advanced:
    scalingModifiers:
      formula: "nas_health > 0 && http_requests > 0 ? 1 : 0"
      target: "1"
      activationTarget: "1"
  triggers:
    - name: http_requests
      type: external-push
      metadata:
        scalerAddress: keda-add-ons-http-external-scaler.observability:9090
        interceptorRoute: ${APP}
    - name: nas_health
      type: prometheus
      metadata:
        serverAddress: http://kube-prometheus-stack-prometheus.observability.svc.cluster.local:9090
        query: min(probe_success{job="${ZEROSCALER_JOB_NAME:=nfs_probe}"})
        threshold: "1"
        activationThreshold: "0"
