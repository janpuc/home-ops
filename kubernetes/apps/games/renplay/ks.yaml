---
# yaml-language-server: $schema=https://k8s-schemas.home-operations.com/kustomize.toolkit.fluxcd.io/kustomization_v1.json
apiVersion: kustomize.toolkit.fluxcd.io/v1
kind: Kustomization
metadata:
  name: &app renplay
spec:
  components:
    - ../../../../components/zeroscaler-http
    - ../../../../components/kopiur/backup
  dependsOn:
    - name: keda
      namespace: observability
    - name: rook-ceph-cluster
      namespace: rook-ceph
  interval: 1h
  path: ./kubernetes/apps/games/renplay/app
  postBuild:
    substitute:
      APP: *app
      HTTP_SVC: *app
      HTTP_PORT: "8080"
      HTTP_HOST: renplay.janpuc.com
      HTTP_COOLDOWN: "3600"
      KOPIUR_CAPACITY: 10Gi
  prune: true
  sourceRef:
    kind: GitRepository
    name: flux-system
    namespace: flux-system
  targetNamespace: games
  wait: false
