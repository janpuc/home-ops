---
# yaml-language-server: $schema=https://k8s-schemas.home-operations.com/helm.toolkit.fluxcd.io/helmrelease_v2.json
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: flux-operator
spec:
  chartRef:
    kind: OCIRepository
    name: flux-operator
  interval: 1h
  values:
    resources:
      limits:
        memory: 448Mi
      requests:
        cpu: 20m
        memory: 320Mi
    serviceMonitor:
      create: true
    web:
      networkPolicy:
        create: false
