---
apiVersion: pocketid.internal/v1alpha1
kind: PocketIDInstance
metadata:
  name: &app pocket-id
spec:
  image: ghcr.io/pocket-id/pocket-id:v2.8.0-distroless@sha256:6a3aad6023ea0729e3763c75b77060d6d5d9069ad566af0b0b14a2288da0c9e0
  timezone: Europe/Warsaw
  appUrl: "https://id.janpuc.com"
  databaseUrl: "file:/app/data/pocket-id.db?_pragma=journal_mode(WAL)&_pragma=busy_timeout(2500)&_txlock=immediate"
  encryptionKey:
    valueFrom:
      secretKeyRef:
        name: &secret pocket-id-secret
        key: ENCRYPTION_KEY
  env:
    - name: LDAP_USER_SEARCH_FILTER
      valueFrom:
        secretKeyRef:
          name: *secret
          key: LDAP_USER_SEARCH_FILTER
    - name: LDAP_GROUPS_SEARCH_FILTER
      valueFrom:
        secretKeyRef:
          name: *secret
          key: LDAP_GROUPS_SEARCH_FILTER
  ldap:
    url: "ldap://lldap.security.svc.cluster.local"
    base: "${SECRET_LDAP_BASE}"
    bindDN: "${SECRET_LDAP_BIND_DN}"
    bindPassword:
      valueFrom:
        secretKeyRef:
          name: *secret
          key: LDAP_BIND_PASSWORD
    skipCertVerify: true
    adminGroupName: "admin"
    attributeMapping:
      userUniqueIdentifier: "uuid"
      groupUniqueIdentifier: "uuid"
      userFirstName: "givenName"
      userLastName: "sn"
      userUsername: "uid"
      userEmail: "mail"
      userProfilePicture: "jpegPhoto"
      groupMember: "member"
      groupName: "cn"
  geoip:
    dbPath: "/app/data/GeoLite2-City.mmdb"
    maxmindLicenseKey:
      valueFrom:
        secretKeyRef:
          name: *secret
          key: MAXMIND_LICENSE_KEY
  ui:
    sessionDuration: 43800
  userManagement:
    emailsVerified: true
  logging:
    level: "info"
  metrics:
    enabled: true
  analyticsDisabled: true
  versionCheckDisabled: true
  route:
    enabled: true
    parentRefs:
      - name: envoy-external
        namespace: networking
    hostnames:
      - id.janpuc.com
  persistence:
    enabled: true
    existingClaim: *app
  resources:
    requests:
      cpu: 10m
      memory: 128Mi
    limits:
      memory: 256Mi
