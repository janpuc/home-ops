---
# yaml-language-server: $schema=https://k8s-schemas.home-operations.com/external-secrets.io/externalsecret_v1.json
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: pocket-id
spec:
  secretStoreRef:
    kind: ClusterSecretStore
    name: onepassword
  target:
    name: pocket-id-secret
    template:
      data:
        # App
        ENCRYPTION_KEY: "{{ .POCKET_ID_ENCRYPTION_KEY }}"
        MAXMIND_LICENSE_KEY: "{{ .POCKET_ID_MAXMIND_LICENSE_KEY }}"
        SMTP_PASSWORD: "{{ .POCKET_ID_SMTP_PASSWORD }}"
        # LDAP
        LDAP_BASE: "{{ .LLDAP_LDAP_BASE_DN }}"
        LDAP_BIND_DN: "{{ .LLDAP_LDAP_USER_DN }}"
        LDAP_BIND_PASSWORD: "{{ .LLDAP_LDAP_USER_PASS }}"
        LDAP_USER_SEARCH_FILTER: "{{ .LLDAP_LDAP_USER_SEARCH_FILTER }}"
        LDAP_GROUPS_SEARCH_FILTER: "{{ .LLDAP_LDAP_GROUPS_SEARCH_FILTER }}"
        # Database
        DB_CONNECTION_STRING: |-
          file:/app/data/pocket-id.db?_pragma=journal_mode(WAL)&_pragma=busy_timeout(2500)&_txlock=immediate

  dataFrom:
    - extract:
        key: lldap
    - extract:
        key: pocket-id
