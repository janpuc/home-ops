---
# yaml-language-server: $schema=https://k8s-schemas.home-operations.com/helm.toolkit.fluxcd.io/helmrelease_v2.json
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: external-secrets
spec:
  chartRef:
    kind: OCIRepository
    name: external-secrets
  interval: 1h
  values:
    leaderElect: true
    serviceMonitor:
      enabled: true
    grafanaDashboard:
      enabled: true
    certController:
      resources:
        requests:
          cpu: 10m
          memory: 96Mi
        limits:
          memory: 160Mi
      serviceMonitor:
        enabled: true
    webhook:
      replicaCount: 2
      resources:
        requests:
          cpu: 10m
          memory: 160Mi
        limits:
          memory: 224Mi
      serviceMonitor:
        enabled: true
    resources:
      requests:
        cpu: 10m
        memory: 64Mi
      limits:
        memory: 96Mi
