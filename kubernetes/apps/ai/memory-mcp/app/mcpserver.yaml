---
# yaml-language-server: $schema=https://k8s-schemas.home-operations.com/toolhive.stacklok.dev/mcpserver_v1beta1.json
apiVersion: toolhive.stacklok.dev/v1beta1
kind: MCPServer
metadata:
  name: memory-mcp
spec:
  image: ghcr.io/bjw-s-labs/mcp-memory:2026.1.26@sha256:df4a7e3709dfe363cd9048df13b2aed7f13ee135f07d07cd318d69f7e058abd8
  groupRef:
    name: mcp-tools
  podTemplateSpec:
    spec:
      volumes:
        - name: data
          persistentVolumeClaim:
            claimName: memory-mcp
      containers:
        - name: mcp
          resources:
            limits:
              memory: 128Mi
            requests:
              cpu: 10m
              memory: 64Mi
          volumeMounts:
            - name: data
              mountPath: /data
  resources:
    limits:
      memory: 48Mi
    requests:
      cpu: 10m
      memory: 24Mi
  transport: stdio
