---
# yaml-language-server: $schema=https://k8s-schemas.home-operations.com/kustomize.toolkit.fluxcd.io/kustomization_v1.json
apiVersion: kustomize.toolkit.fluxcd.io/v1
kind: Kustomization
metadata:
  name: llama-cpp
spec:
  commonMetadata:
    labels:
      app.kubernetes.io/name: llama-cpp
  components:
    - ../../../../components/gpu
    - ../../../../components/nfs-scaler
    - ../../../../components/volsync
  dependsOn:
    - name: volsync
      namespace: volsync-system
  interval: 1h
  path: ./kubernetes/apps/ai/llama-cpp/app
  postBuild:
    substitute:
      APP: llama-cpp
      VOLSYNC_CAPACITY: 10Gi
  prune: true
  sourceRef:
    kind: GitRepository
    name: flux-system
    namespace: flux-system
  targetNamespace: ai
  wait: false
