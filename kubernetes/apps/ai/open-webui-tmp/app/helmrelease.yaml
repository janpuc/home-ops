---
# yaml-language-server: $schema=https://raw.githubusercontent.com/bjw-s-labs/helm-charts/main/charts/other/app-template/schemas/helmrelease-helm-v2.schema.json
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: open-webui-tmp
spec:
  chartRef:
    kind: OCIRepository
    name: open-webui-tmp
  interval: 30m
  values:
    controllers:
      open-webui-tmp:
        annotations:
          reloader.stakater.com/auto: "true"
        containers:
          app:
            image:
              repository: ghcr.io/open-webui/open-webui
              tag: v0.9.6@sha256:90eae5b419e40b4c3dd684582b2c83440b36f9ae2f6532c09639b2ba4ee65158
            env:
              # App
              WEBUI_URL: https://chat.janpuc.com
              CORS_ALLOW_ORIGIN: https://chat.janpuc.com
              DEFAULT_LOCALE: en
              ENABLE_OPENAI_API: true
              OPENAI_API_BASE_URL: http://litellm.ai.svc.cluster.local:4000/v1
              ENABLE_OLLAMA_API: false
              ENABLE_WEB_SEARCH: false
              ENABLE_SIGNUP: true
              ENABLE_SEARCH_QUERY_GENERATION: true
              ENABLE_PERSISTENT_CONFIG: false
              WEBUI_SESSION_COOKIE_SAME_SITE: lax
              WEBUI_SESSION_COOKIE_SECURE: true
              TOOL_SERVER_CONNECTIONS: '[{"type":"mcp","url":"http://vmcp-mcp-gateway-internal.ai.svc.cluster.local:4483/mcp","spec_type":"url","spec":"","path":"openapi.json","auth_type":"none","key":"","config":{"enable":true},"info":{"id":"mcp-gateway","name":"MCP Gateway","description":""}}]'
              # Redis
              ENABLE_WEBSOCKET_SUPPORT: true
              WEBSOCKET_MANAGER: redis
              WEBSOCKET_REDIS_URL: redis://open-webui-tmp-dragonfly:6379
            envFrom:
              - secretRef:
                  name: open-webui-tmp-secret
            resources:
              requests:
                cpu: 1500m
                memory: 1024Mi
              limits:
                memory: 1536Mi
    persistence:
      config:
        enabled: true
        existingClaim: open-webui-tmp
        globalMounts:
          - path: /app/backend/data
      tmpfs:
        type: emptyDir
        advancedMounts:
          open-webui-tmp:
            app:
              - path: /tmp
                subPath: tmp
    route:
      app:
        hostnames:
          - chat-tmp.janpuc.com
        parentRefs:
          - name: envoy-external
            namespace: network
    service:
      app:
        ports:
          http:
            port: 8080
