---
# yaml-language-server: $schema=https://k8s-schemas.home-operations.com/kustomize.toolkit.fluxcd.io/kustomization_v1.json
apiVersion: kustomize.toolkit.fluxcd.io/v1
kind: Kustomization
metadata:
  name: kubectl-mcp
spec:
  commonMetadata:
    labels:
      app.kubernetes.io/name: kubectl-mcp
  dependsOn:
    - name: toolhive-operator-crds
      namespace: ai
  interval: 1h
  path: ./kubernetes/apps/ai/kubectl-mcp/app
  prune: true
  sourceRef:
    kind: GitRepository
    name: flux-system
    namespace: flux-system
  targetNamespace: ai
