---
# yaml-language-server: $schema=https://k8s-schemas.home-operations.com/toolhive.stacklok.dev/mcpserver_v1beta1.json
apiVersion: toolhive.stacklok.dev/v1beta1
kind: MCPServer
metadata:
  name: kubectl-mcp
spec:
  image: ghcr.io/rohitg00/kubectl-mcp-server:1.24.0
  groupRef:
    name: mcp-tools
  podTemplateSpec:
    spec:
      containers:
        - name: mcp
          resources:
            limits:
              memory: 384Mi
            requests:
              cpu: 10m
              memory: 256Mi
  resources:
    limits:
      memory: 160Mi
    requests:
      cpu: 10m
      memory: 96Mi
  transport: stdio
