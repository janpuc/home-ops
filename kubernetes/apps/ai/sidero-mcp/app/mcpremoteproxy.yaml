---
# yaml-language-server: $schema=https://k8s-schemas.home-operations.com/toolhive.stacklok.dev/mcpremoteproxy_v1beta1.json
apiVersion: toolhive.stacklok.dev/v1alpha1
kind: MCPRemoteProxy
metadata:
  name: sidero
spec:
  remoteUrl: https://docs.siderolabs.com/mcp
  transport: streamable-http
  groupRef:
    name: mcp-tools
  resources:
    limits:
      memory: 48Mi
    requests:
      cpu: 10m
      memory: 24Mi
