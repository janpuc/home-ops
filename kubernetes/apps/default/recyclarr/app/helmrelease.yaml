---
# yaml-language-server: $schema=https://kubernetes-schemas.pages.dev/helm.toolkit.fluxcd.io/helmrelease_v2.json
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: recyclarr
spec:
  chartRef:
    kind: OCIRepository
    name: recyclarr
  interval: 1h
  values:
    controllers:
      recyclarr:
        type: cronjob
        cronjob:
          schedule: 0 0 * * *
          backoffLimit: 0
          concurrencyPolicy: Forbid
          successfulJobsHistory: 1
          failedJobsHistory: 1
          ttlSecondsAfterFinished: 86400
        containers:
          app:
            image:
              repository: ghcr.io/recyclarr/recyclarr
              tag: 8.5.0@sha256:5da14297a11aa910582d800f0edcb8f9e9d488642083c01dc34950f6449d9214
            envFrom:
              - secretRef:
                  name: "{{ .Release.Name }}-secret"
            args:
              - sync
            resources:
              requests:
                cpu: 10m
                memory: 32Mi
              limits:
                memory: 128Mi
            securityContext:
              allowPrivilegeEscalation: false
              readOnlyRootFilesystem: true
              capabilities: {drop: ["ALL"]}
        pod:
          restartPolicy: Never
    defaultPodOptions:
      securityContext:
        runAsNonRoot: true
        runAsUser: 1000
        runAsGroup: 1000
        fsGroup: 1000
        fsGroupChangePolicy: OnRootMismatch
    persistence:
      config:
        existingClaim: "{{ .Release.Name }}"
      config-file:
        type: configMap
        name: "{{ .Release.Name }}-configmap"
        globalMounts:
          - path: /config/recyclarr.yml
            subPath: recyclarr.yml
      settings-file:
        type: configMap
        name: settings-configmap
        globalMounts:
          - path: /config/settings.yml
            subPath: settings.yml
      polish-language-radarr-file:
        type: configMap
        name: polish-language-radarr-configmap
        globalMounts:
          - path: /config/custom-formats/radarr/polish-language-radarr.json
            subPath: polish-language-radarr.json
      polish-language-sonarr-file:
        type: configMap
        name: polish-language-sonarr-configmap
        globalMounts:
          - path: /config/custom-formats/sonarr/polish-language-sonarr.json
            subPath: polish-language-sonarr.json
      tmp:
        type: emptyDir
