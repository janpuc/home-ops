---
# yaml-language-server: $schema=https://kubernetes-schemas.pages.dev/helm.toolkit.fluxcd.io/helmrelease_v2.json
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: manga-maid
spec:
  chartRef:
    kind: OCIRepository
    name: manga-maid
  interval: 1h
  values:
    controllers:
      komf:
        containers:
          app:
            image:
              repository: ghcr.io/pullaf/manga-maid
              tag: sha256:a8ea5d604177b5922b40e2dfdfb46ce53bc34baf3c52c99557e9808f2106f08a
            env:
              TZ: Europe/Warsaw
              SYNC_CRON: "0 */6 * * *"
              DEFAULT_LANGUAGE: en
              SUWAYOMI_URL: http://suwayomi.default.svc.cluster.local
              KAVITA_URL: http://kavita.default.svc.cluster.local:5000
            envFrom:
              - secretRef:
                  name: "{{ .Release.Name }}-secret"
            resources:
              requests:
                cpu: 10m
                memory: 256Mi
              limits:
                memory: 512Mi
            securityContext:
              allowPrivilegeEscalation: false
              readOnlyRootFilesystem: true
              capabilities: {drop: ["ALL"]}
    defaultPodOptions:
      securityContext:
        runAsNonRoot: true
        runAsUser: 1000
        runAsGroup: 1000
        fsGroup: 1000
        fsGroupChangePolicy: OnRootMismatch
    service:
      app:
        ports:
          http:
            port: &port 4649
    route:
      app:
        hostnames:
          - "{{ .Release.Name }}.janpuc.com"
        parentRefs:
          - name: envoy-internal
            namespace: network
    persistence:
      data:
        existingClaim: "{{ .Release.Name }}"
      media:
        type: nfs
        server: bigmouth.internal
        path: /mnt/Vault/Media/Comics
        globalMounts:
          - path: /manga
