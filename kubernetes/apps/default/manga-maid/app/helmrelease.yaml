---
# yaml-language-server: $schema=https://k8s-schemas.home-operations.com/helm.toolkit.fluxcd.io/helmrelease_v2.json
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: manga-maid
spec:
  chartRef:
    kind: OCIRepository
    name: manga-maid
  interval: 1h
  values:
    controllers:
      komf:
        containers:
          app:
            image:
              repository: ghcr.io/pullaf/manga-maid
              tag: 2.1.6@sha256:2c693ff270dc90887dae686bbbd9a51f333efda5c5e32801673c8e541616acd0
            env:
              TZ: Europe/Warsaw
              SYNC_CRON: "0 */6 * * *"
              DEFAULT_LANGUAGE: en
              SUWAYOMI_URL: http://suwayomi.default.svc.cluster.local
              KAVITA_URL: http://kavita.default.svc.cluster.local:5000
            resources:
              requests:
                cpu: 10m
                memory: 256Mi
              limits:
                memory: 512Mi
            securityContext:
              allowPrivilegeEscalation: false
              readOnlyRootFilesystem: true
              capabilities: {drop: ["ALL"]}
    defaultPodOptions:
      securityContext:
        runAsNonRoot: true
        runAsUser: 1000
        runAsGroup: 1000
        fsGroup: 1000
        fsGroupChangePolicy: OnRootMismatch
    service:
      app:
        ports:
          http:
            port: &port 4649
    route:
      app:
        hostnames:
          - "{{ .Release.Name }}.janpuc.com"
        parentRefs:
          - name: envoy-internal
            namespace: network
    persistence:
      data:
        existingClaim: "{{ .Release.Name }}"
      media:
        type: nfs
        server: bigmouth.internal
        path: /mnt/Vault/Media/Comics
        globalMounts:
          - path: /manga
      tmp:
        type: emptyDir
