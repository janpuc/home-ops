---
# yaml-language-server: $schema=https://kubernetes-schemas.pages.dev/helm.toolkit.fluxcd.io/helmrelease_v2.json
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: komf
spec:
  chartRef:
    kind: OCIRepository
    name: komf
  interval: 1h
  values:
    controllers:
      komf:
        containers:
          app:
            image:
              repository: ghcr.io/baxtrax/komf # Use until https://github.com/Snd-R/komf/pull/306 is merged
              tag: 1.7.1-patched@sha256:eda751c1a7f58e40f5e38a4e8721968c8779d3a2d81addb6b8b270ee34f163d2
            env:
              KOMF_KAVITA_BASE_URI: http://kavita.default.svc.cluster.local:5000
              KOMF_LOG_LEVEL: INFO
              KOMF_SERVER_PORT: &port 8085
            envFrom:
              - secretRef:
                  name: "{{ .Release.Name }}-secret"
            resources:
              requests:
                cpu: 10m
                memory: 256Mi
              limits:
                memory: 512Mi
            securityContext:
              allowPrivilegeEscalation: false
              readOnlyRootFilesystem: true
              capabilities: {drop: ["ALL"]}
    defaultPodOptions:
      securityContext:
        runAsNonRoot: true
        runAsUser: 1000
        runAsGroup: 1000
        fsGroup: 1000
        fsGroupChangePolicy: OnRootMismatch
    service:
      app:
        ports:
          http:
            port: *port
    route:
      app:
        hostnames:
          - "{{ .Release.Name }}.janpuc.com"
        parentRefs:
          - name: envoy-internal
            namespace: network
    persistence:
      application:
        type: configMap
        name: komf-configmap
        globalMounts:
          - path: /config/application.yml
            subPath: application.yml
            readOnly: true
      config:
        existingClaim: "{{ .Release.Name }}"
      media:
        type: nfs
        server: bigmouth.internal
        path: /mnt/Vault/Media
        globalMounts:
          - path: /media
      tmp:
        type: emptyDir
