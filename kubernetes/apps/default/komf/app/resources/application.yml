# Komga is not used in this cluster; disable its event listener so the
# process does not try to dial a host that does not exist.
komga:
  baseUri: http://komga.invalid
  eventListener:
    enabled: false

kavita:
  eventListener:
    enabled: true
    metadataLibraryFilter: []
    metadataSeriesExcludeFilter: []
    notificationsLibraryFilter: []
  metadataUpdate:
    default:
      libraryType: "MANGA"
      updateModes: [ API, COMIC_INFO ] # can use multiple options at once. available options are API, COMIC_INFO
      aggregate: true # if enabled will search and aggregate metadata from all configured providers
      mergeTags: true # if true and aggregate is enabled will merge tags from all providers
      mergeGenres: true # if true and aggregate is enabled will merge genres from all providers
      bookCovers: false # update book thumbnails
      seriesCovers: true # update series thumbnails
      overrideExistingCovers: false # if false will upload but not select new cover if another cover already exists
      lockCovers: true # lock cover images so that kavita does not change them
      postProcessing:
        seriesTitle: true # update series title
        seriesTitleLanguage: "en" # series title update language
        alternativeSeriesTitles: true # use other title types as alternative title option
        alternativeSeriesTitleLanguages: # alternative title languages
          - "en"
          - "ja"
          - "ja-ro"
        orderBooks: true # will order books using parsed volume or chapter number

database:
  file: ./database.sqlite # database file location.

metadataProviders:
  defaultProviders:
    mangaUpdates:
      priority: 10
      enabled: true
      mediaType: "MANGA"
    mal:
      priority: 20
      enabled: true
    nautiljon:
      priority: 30
      enabled: false
    aniList:
      priority: 40
      enabled: true
      mediaType: "MANGA" # filter used in matching. Can be NOVEL or MANGA. MANGA type includes everything except novels
      tagsScoreThreshold: 60 # tags with this score or higher will be included
      tagsSizeLimit: 15 # amount of tags that will be included
    yenPress:
      priority: 50
      enabled: true
      mediaType: "MANGA" # filter used in matching. Can be NOVEL or MANGA.
    kodansha:
      priority: 60
      enabled: true
    viz:
      priority: 70
      enabled: true
    bookWalker:
      priority: 80
      enabled: true
      mediaType: "MANGA" # filter used in matching. Can be NOVEL or MANGA.
    mangaDex:
      priority: 90
      enabled: true
      coverLanguages:
        - "en"
        - "ja"
