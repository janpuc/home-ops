---
# yaml-language-server: $schema=https://k8s-schemas.home-operations.com/helm.toolkit.fluxcd.io/helmrelease_v2.json
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: tunarr
spec:
  chartRef:
    kind: OCIRepository
    name: tunarr
  interval: 1h
  values:
    controllers:
      tunarr:
        pod:
          resourceClaims:
            - name: gpu
              resourceClaimTemplateName: tunarr-gpu
        initContainers:
          init-chown:
            image:
              repository: public.ecr.aws/docker/library/busybox
              tag: "1.37"
            command: ["sh", "-c", "chown -R 0:0 /config && chmod -R u+rwX /config"]
            securityContext:
              runAsUser: 0
        containers:
          app:
            image:
              repository: ghcr.io/chrisbenincasa/tunarr
              tag: 1.3.4@sha256:4c2035624de767984d092ddecb73af7c7af40ab788609c0e43874c01cb805528
            env:
              TZ: Europe/Warsaw
              LOG_LEVEL: INFO
              HOME: /config
              XDG_DATA_HOME: /config
              XDG_CONFIG_HOME: /config
            args:
              - server
            probes:
              liveness: &probes
                enabled: true
                custom: true
                spec:
                  httpGet:
                    path: /
                    port: &port 8000
                  initialDelaySeconds: 0
                  periodSeconds: 10
                  timeoutSeconds: 5
                  failureThreshold: 3
              readiness: *probes
              startup:
                enabled: true
                spec:
                  httpGet:
                    path: /
                    port: *port
                  failureThreshold: 30
                  periodSeconds: 10
            securityContext:
              allowPrivilegeEscalation: false
              capabilities: { drop: ["ALL"] }
            resources:
              claims:
                - name: gpu
              requests:
                cpu: 10m
                memory: 128Mi
              limits:
                memory: 4Gi
    defaultPodOptions:
      automountServiceAccountToken: false
      securityContext:
        runAsUser: 0
        runAsGroup: 0
        fsGroup: 0
    service:
      app:
        ports:
          http:
            port: *port
    route:
      app:
        hostnames:
          - tv.janpuc.com
          - "{{ .Release.Name }}.janpuc.com"
        parentRefs:
          - name: envoy-internal
            namespace: network
    persistence:
      config:
        existingClaim: "{{ .Release.Name }}"
        globalMounts:
          - path: /config
      media:
        type: nfs
        server: bigmouth.internal
        path: /mnt/Vault/Media
        globalMounts:
          - path: /media
            readOnly: true
      tmpfs:
        type: emptyDir
        advancedMounts:
          tunarr:
            app:
              - path: /tmp
                subPath: tmp
              - path: /transcode
                subPath: transcode
              - path: /cache
                subPath: cache
