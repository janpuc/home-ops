---
# yaml-language-server: $schema=https://k8s-schemas.home-operations.com/helm.toolkit.fluxcd.io/helmrelease_v2.json
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: keda
spec:
  chartRef:
    kind: OCIRepository
    name: keda
  interval: 1h
  values:
    enableServiceLinks: false
    prometheus:
      metricServer:
        enabled: true
        serviceMonitor:
          enabled: true
      operator:
        enabled: true
        serviceMonitor:
          enabled: true
      webhooks:
        enabled: true
        serviceMonitor:
          enabled: true
    resources:
      operator:
        requests:
          cpu: 20m
          memory: 192Mi
        limits:
          memory: 320Mi
      metricServer:
        requests:
          cpu: 15m
          memory: 64Mi
        limits:
          memory: 96Mi
      webhooks:
        requests:
          cpu: 10m
          memory: 32Mi
        limits:
          memory: 48Mi
