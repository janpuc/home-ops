---
# yaml-language-server: $schema=https://kubernetes-schemas.pages.dev/helm.toolkit.fluxcd.io/helmrelease_v2.json
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: keda-http-add-on
spec:
  chartRef:
    kind: OCIRepository
    name: keda-http-add-on
  interval: 1h
  values:
    interceptor:
      replicas:
        min: 1
        max: 2
    operator:
      watchNamespace: default
    logging:
      interceptor:
        level: debug
