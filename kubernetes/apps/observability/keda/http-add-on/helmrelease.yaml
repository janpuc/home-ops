---
# yaml-language-server: $schema=https://k8s-schemas.home-operations.com/helm.toolkit.fluxcd.io/helmrelease_v2.json
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: keda-http-add-on
spec:
  chartRef:
    kind: OCIRepository
    name: keda-http-add-on
  interval: 1h
  values:
    interceptor:
      replicas:
        min: 1
        max: 2
      resources:
        requests:
          cpu: 10m
          memory: 24Mi
        limits:
          memory: 48Mi
    operator:
      resources:
        requests:
          cpu: 10m
          memory: 32Mi
        limits:
          memory: 48Mi
      watchNamespace: default
    scaler:
      resources:
        requests:
          cpu: 20m
          memory: 32Mi
        limits:
          memory: 48Mi
