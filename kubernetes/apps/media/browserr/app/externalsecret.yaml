---
# yaml-language-server: $schema=https://k8s-schemas.home-operations.com/external-secrets.io/externalsecret_v1.json
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: browserr
spec:
  secretStoreRef:
    kind: ClusterSecretStore
    name: onepassword
  target:
    name: browserr-secret
    template:
      data:
        TMDB_ACCESS_TOKEN: "{{ .BROWSERR_TMDB_ACCESS_TOKEN }}"
        SEERR_API_KEY: "{{ .SEERR_API_KEY }}"
  dataFrom:
    - extract:
        key: browserr
    - extract:
        key: seerr
