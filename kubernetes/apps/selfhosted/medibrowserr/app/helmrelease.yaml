---
# yaml-language-server: $schema=https://k8s-schemas.home-operations.com/helm.toolkit.fluxcd.io/helmrelease_v2.json
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: medibrowserr
spec:
  chartRef:
    kind: OCIRepository
    name: medibrowserr
  interval: 1h
  values:
    controllers:
      browserr:
        annotations:
          reloader.stakater.com/auto: "true"
        containers:
          app:
            image:
              repository: ghcr.io/janpuc/medibrowserr
              tag: 1.2.0@sha256:1f696a6383c1360e8906ffcd9e764a5d2b7cf300efb3fbb983de1ce005251dcb
            env:
              PORT: &port 3000
              MEDIBROWSERR_URL: "https://{{ .Release.Name }}.janpuc.com"
              MEDIBROWSERR_DEFAULT_LANGUAGE: en
              MEDIBROWSERR_DEFAULT_INTERVAL: "15"
              MEDIBROWSERR_QUIET_HOURS_ENABLED: "true"
              MEDIBROWSERR_QUIET_HOURS: "23-7"
            envFrom:
              - secretRef:
                  name: "{{ .Release.Name }}-secret"
            probes:
              liveness:
                enabled: true
                spec:
                  periodSeconds: 30
                  timeoutSeconds: 5
                  failureThreshold: 5
              readiness:
                enabled: true
                custom: true
                spec:
                  httpGet:
                    path: /api/health
                    port: *port
                  periodSeconds: 10
                  timeoutSeconds: 5
                  failureThreshold: 5
              startup:
                enabled: true
                spec:
                  failureThreshold: 30
                  periodSeconds: 10
            resources:
              requests:
                cpu: 10m
                memory: 256Mi
              limits:
                memory: 512Mi
            securityContext:
              allowPrivilegeEscalation: false
              readOnlyRootFilesystem: true
              capabilities: {drop: ["ALL"]}
    defaultPodOptions:
      securityContext:
        runAsNonRoot: true
        runAsUser: 1000
        runAsGroup: 1000
        fsGroup: 1000
        fsGroupChangePolicy: OnRootMismatch
    service:
      app:
        ports:
          http:
            port: *port
    route:
      app:
        hostnames:
          - "{{ .Release.Name }}.janpuc.com"
        parentRefs:
          - name: envoy-internal
            namespace: network
    persistence:
      data:
        existingClaim: "{{ .Release.Name }}"
