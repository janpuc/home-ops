---
# yaml-language-server: $schema=https://k8s-schemas.home-operations.com/helm.toolkit.fluxcd.io/helmrelease_v2.json
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: mealie
spec:
  chartRef:
    kind: OCIRepository
    name: mealie
  interval: 1h
  values:
    controllers:
      mealie:
        containers:
          app:
            image:
              repository: ghcr.io/mealie-recipes/mealie
              tag: v3.21.0@sha256:4e1e8d98b883009cb849851857e277109c21db1c2d857ae61e14de894f2169ff
            env:
              PUID: 1000
              PGID: 1000
              ALLOW_SIGNUP: "false"
              ALLOW_PASSWORD_LOGIN: "false"
              BASE_URL: https://recipes.janpuc.com
              DB_ENGINE: sqlite
              THEME_DARK_PRIMARY: "#cba6f7"
              THEME_DARK_ACCENT: "#f5c2e7"
              THEME_DARK_SECONDARY: "#b4befe"
              THEME_DARK_SUCCESS: "#a6e3a1"
              THEME_DARK_INFO: "#89b4fa"
              THEME_DARK_WARNING: "#fab387"
              THEME_DARK_ERROR: "#f38ba8"
              THEME_LIGHT_PRIMARY: "#8839ef"
              THEME_LIGHT_ACCENT: "#ea76cb"
              THEME_LIGHT_SECONDARY: "#7287fd"
              THEME_LIGHT_SUCCESS: "#40a02b"
              THEME_LIGHT_INFO: "#1e66f5"
              THEME_LIGHT_WARNING: "#df8e1d"
              THEME_LIGHT_ERROR: "#d20f39"
              OIDC_AUTH_ENABLED: "true"
              OIDC_CONFIGURATION_URL: https://id.janpuc.com/.well-known/openid-configuration
              OIDC_USER_GROUP: ID-Users
              OIDC_ADMIN_GROUP: ID-Admin
              OIDC_AUTO_REDIRECT: "true"
              OIDC_PROVIDER_NAME: "Pocket ID"
              OIDC_REMEMBER_ME: "true"
            envFrom:
              - secretRef:
                  name: "{{ .Release.Name }}-secret"
              - secretRef:
                  name: "{{ .Release.Name }}-oidc-credentials"
            probes:
              liveness:
                enabled: true
                spec:
                  periodSeconds: 30
                  timeoutSeconds: 5
                  failureThreshold: 5
              readiness:
                enabled: true
                custom: true
                spec:
                  httpGet:
                    path: /api/app/about
                    port: ${HTTP_PORT}
                  periodSeconds: 10
                  timeoutSeconds: 5
                  failureThreshold: 5
              startup:
                enabled: true
                spec:
                  failureThreshold: 30
                  periodSeconds: 10
            resources:
              requests:
                cpu: 10m
                memory: 256Mi
              limits:
                memory: 4Gi
            securityContext:
              allowPrivilegeEscalation: false
              readOnlyRootFilesystem: true
              capabilities: {drop: ["ALL"]}
    defaultPodOptions:
      securityContext:
        runAsNonRoot: true
        runAsUser: 1000
        runAsGroup: 1000
        fsGroup: 1000
        fsGroupChangePolicy: OnRootMismatch
    service:
      app:
        ports:
          http:
            port: ${HTTP_PORT}
    persistence:
      config:
        existingClaim: "{{ .Release.Name }}"
        globalMounts:
          - path: /app/data
      tmpfs:
        type: emptyDir
        globalMounts:
          - path: /tmp
