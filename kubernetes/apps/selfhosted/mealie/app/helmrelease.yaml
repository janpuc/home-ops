---
# yaml-language-server: $schema=https://k8s-schemas.home-operations.com/helm.toolkit.fluxcd.io/helmrelease_v2.json
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: mealie
spec:
  chartRef:
    kind: OCIRepository
    name: mealie
  interval: 1h
  values:
    controllers:
      mealie:
        containers:
          app:
            image:
              repository: ghcr.io/mealie-recipes/mealie
              tag: v3.20.0@sha256:060031897306aaee2cafd098ebe718f0d649abceac3a3f29801e6dab5f6db04b
            env:
              PUID: 1000
              PGID: 1000
              ALLOW_SIGNUP: "false"
              ALLOW_PASSWORD_LOGIN: "false"
              BASE_URL: https://recipes.janpuc.com
              DB_ENGINE: sqlite
              OIDC_AUTH_ENABLED: "true"
              OIDC_CONFIGURATION_URL: https://id.janpuc.com/.well-known/openid-configuration
              OIDC_USER_GROUP: id-users
              OIDC_ADMIN_GROUP: id-admin
              OIDC_AUTO_REDIRECT: "true"
              OIDC_PROVIDER_NAME: "Pocket ID"
              OIDC_REMEMBER_ME: "true"
            envFrom:
              - secretRef:
                  name: "{{ .Release.Name }}-secret"
              - secretRef:
                  name: "{{ .Release.Name }}-oidc-credentials"
            probes:
              liveness:
                enabled: true
                spec:
                  periodSeconds: 30
                  timeoutSeconds: 5
                  failureThreshold: 5
              readiness:
                enabled: true
                custom: true
                spec:
                  httpGet:
                    path: /api/app/about
                    port: ${HTTP_PORT}
                  periodSeconds: 10
                  timeoutSeconds: 5
                  failureThreshold: 5
              startup:
                enabled: true
                spec:
                  failureThreshold: 30
                  periodSeconds: 10
            resources:
              requests:
                cpu: 10m
                memory: 256Mi
              limits:
                memory: 512Mi
            securityContext:
              allowPrivilegeEscalation: false
              readOnlyRootFilesystem: true
              capabilities: {drop: ["ALL"]}
    defaultPodOptions:
      securityContext:
        runAsNonRoot: true
        runAsUser: 1000
        runAsGroup: 1000
        fsGroup: 1000
        fsGroupChangePolicy: OnRootMismatch
    service:
      app:
        ports:
          http:
            port: ${HTTP_PORT}
    persistence:
      config:
        existingClaim: "{{ .Release.Name }}"
        globalMounts:
          - path: /app/data
